kind = "web"
    previewPath = "/"
    title = "PRE-Atendimento V8"
    version = "1.0.0"
    id = "artifacts/api-server"
    router = "path"

    [[services]]
    name = "web"
    paths = [ "/" ]
    localPort = 5000

    [services.development]
    run = "npm run dev"

    [services.production]
    run = "npm start"

    [services.env]
    PORT = "5000"
